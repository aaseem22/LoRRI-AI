<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORRI.AI | Global Freight Intelligence</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #00d4ff;
            --bg-dark: #0b0e11;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Fullscreen Map Layer */
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            z-index: 0;
        }

        /* UI Layer */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            padding: 20px;
        }

        /* Let clicks pass through the invisible grid to the map */
        .ui-overlay, .container-fluid, .row, .col-left, .col-right {
            pointer-events: none;
        }

        /* ONLY the visible glass panels and chat box should catch mouse clicks */
        .glass-panel {
            pointer-events: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* KPI Card Styling */
        .kpi-card {
            padding: 15px;
            margin-bottom: 15px;
            text-align: right;
        }

        .kpi-value {
            color: var(--primary-blue);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0;
        }

        /* Chat UI Styling */
        .chat-container {
            height: 75vh;
            display: flex;
            flex-direction: column;
        }

        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 0.9rem;
            padding-right: 10px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 10px; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--primary-blue); border-radius: 10px; opacity: 0.5;}

        .input-group input {
            background: rgba(0,0,0,0.3) !important;
            border: 1px solid var(--glass-border) !important;
            color: white !important;
        }

        .btn-ai {
            background: var(--primary-blue);
            border: none;
            color: black;
            font-weight: 600;
        }

        .btn-ai:hover { background: #00a8cc; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-overlay">
        <div class="container-fluid h-100 pt-3">
            <div class="row h-100">
                
                <div class="col-md-4 col-lg-3 col-left d-flex flex-column">
                    <div class="glass-panel p-3 chat-container mb-3">
                        <div class="d-flex align-items-center mb-3">
                            <div style="width: 10px; height: 10px; background: #00ff00; border-radius: 50%; margin-right: 10px; box-shadow: 0 0 5px #00ff00;"></div>
                            <h5 class="m-0 text-uppercase tracking-widest" style="letter-spacing: 2px;">LORRI.AI</h5>
                        </div>
                        <hr class="bg-secondary">
                        
                        <div id="chat-box" class="mb-3">
                            <div class="mb-2">
                                <small class="text-info">LORRI:</small>
                                <div class="p-2 rounded bg-dark border border-secondary">Intelligence grid online. Systems monitoring global corridors. How can I assist with your freight optimization today?</div>
                            </div>
                        </div>

                        <div class="input-group mt-auto">
                            <input type="text" id="user-input" class="form-control" placeholder="Type a prompt (e.g. cheapest rates out of Mumbai)..." onkeypress="if(event.key === 'Enter') sendMessage()">
                            <button class="btn btn-ai px-3" onclick="sendMessage()">→</button>
                        </div>
                    </div>

                    <div class="glass-panel p-2" style="border-left: 3px solid #00d4ff;">
                        <div class="d-flex justify-content-between align-items-center">
                            <small class="text-success text-uppercase" style="font-size: 0.65rem; letter-spacing: 1px;">
                                <span class="spinner-grow spinner-grow-sm text-success me-1" role="status" style="width: 0.5rem; height: 0.5rem;"></span>
                                Autonomous Grid Active
                            </small>
                        </div>
                        <div id="agent-ticker" class="text-secondary mt-1" style="font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: monospace;">
                            > Initializing global procurement agents...
                        </div>
                    </div>
                </div>

                <div class="col-md-3 col-lg-2 col-right ms-auto">
                    <div class="glass-panel kpi-card">
                        <small class="text-secondary text-uppercase" style="font-size: 0.7rem;">Est. ROI Increase</small>
                        <p class="kpi-value" id="roi-value">+$0</p>
                    </div>
                    <div class="glass-panel kpi-card">
                        <small class="text-secondary text-uppercase" style="font-size: 0.7rem;">CO2 Optimization</small>
                        <p class="kpi-value text-success" id="co2-value">0%</p>
                    </div>
                    <div class="glass-panel kpi-card mb-4">
                        <small class="text-secondary text-uppercase" style="font-size: 0.7rem;">Active Fleet</small>
                        <p class="kpi-value" id="fleet-value">0</p>
                    </div>

                    <div class="glass-panel p-3 text-center">
                        <p class="text-secondary mb-2" style="font-size: 0.7rem; letter-spacing: 1px;">READY TO DEPLOY LORRI?</p>
                        <button class="btn btn-outline-info w-100 mb-2 py-2" style="font-size: 0.8rem; font-weight: 600;">📥 DOWNLOAD REPORT</button>
                        <button class="btn btn-ai w-100 shadow-lg py-2" style="font-size: 0.8rem; font-weight: 600;">🚀 BOOK DEMO</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize Map with Dark Mode Tiles
        var map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([20.0, 0.0], 2); // Default to Global View

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // API Interaction Function
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = input.value;
            if (!message) return;

            // 1. Update UI with User Message
            chatBox.innerHTML += `<div class="mb-2 text-end"><small class="text-secondary">YOU:</small><div class="p-2 rounded bg-primary text-black d-inline-block">${message}</div></div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // 2. Add Loading Spinner
            const loadingHtml = `
                <div id="loading-indicator" class="mb-2">
                    <small class="text-info">LORRI:</small>
                    <div class="p-2 rounded bg-dark border border-secondary text-secondary">
                        <em>Calculating optimal lanes... <span class="spinner-border spinner-border-sm text-info ms-2" role="status"></span></em>
                    </div>
                </div>`;
            chatBox.innerHTML += loadingHtml;
            chatBox.scrollTop = chatBox.scrollHeight;
            input.disabled = true;

            try {
                // Fetch from Flask Backend
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();

                // 3. Remove Loading Spinner
                document.getElementById('loading-indicator').remove();
                input.disabled = false;
                input.focus(); 

                // Update Chat with LLM Response
                chatBox.innerHTML += `<div class="mb-2"><small class="text-info">LORRI:</small><div class="p-2 rounded bg-dark border border-info">${data.message}</div></div>`;
                chatBox.scrollTop = chatBox.scrollHeight;

                // Update Dashboard KPI Numbers
                document.getElementById('roi-value').innerText = `+$${data.roi_calc.cost_saved_usd.toLocaleString()}`;
                document.getElementById('co2-value').innerText = `${data.roi_calc.sustainability_score_improvement}%`;
                document.getElementById('fleet-value').innerText = data.roi_calc.active_fleet.toLocaleString();

                // Move Map and Draw Route
                if (data.map_action) {
                    const destinationLatLng = [data.map_action.lat, data.map_action.lon];
                    
                    map.flyTo(destinationLatLng, data.map_action.zoom, { animate: true, duration: 2.5 });
                    
                    map.eachLayer((layer) => {
                        if (layer instanceof L.Polyline || layer instanceof L.CircleMarker) {
                            map.removeLayer(layer);
                        }
                    });

                    const originLatLng = [31.2222, 121.4581]; // Shanghai HQ

                    if (data.map_action.region !== "Global Dashboard") {
                        L.polyline([originLatLng, destinationLatLng], {
                            color: '#00d4ff',
                            weight: 3,
                            opacity: 0.7,
                            dashArray: '10, 10', 
                            lineJoin: 'round'
                        }).addTo(map);

                        L.circleMarker(originLatLng, {
                            radius: 6, fillColor: "#ff0055", color: "#fff", fillOpacity: 0.8
                        }).addTo(map).bindPopup("Origin: Shanghai HQ");
                    }

                    L.circleMarker(destinationLatLng, {
                        radius: 10,
                        fillColor: "#00d4ff",
                        color: "#fff",
                        fillOpacity: 0.8
                    }).addTo(map).bindPopup(`AI Focus: ${data.map_action.region}`).openPopup();
                }
            } catch (err) {
                console.error("Connection to Flask failed.", err);
                document.getElementById('loading-indicator').innerHTML = `<span class="text-danger">Error connecting to intelligence grid.</span>`;
                input.disabled = false;
            }
        }

        // Background Heartbeat for Autonomous Agents
        setInterval(async () => {
            try {
                const response = await fetch('/live_status');
                const data = await response.json();
                
                const ticker = document.getElementById('agent-ticker');
                const agentString = `> ${data.activity.agent} is ${data.activity.activity} [${data.activity.impact}] | ⚠️ ${data.freight_event.event.toUpperCase()} in ${data.freight_event.region}`;
                
                ticker.innerHTML = agentString;
            } catch (err) {
                // Fail silently in the background if the server is busy
            }
        }, 3500); 
    </script>
</body>
</html>
