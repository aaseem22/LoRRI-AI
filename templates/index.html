<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORRI.AI | Global Freight Intelligence</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #00d4ff;
            --bg-dark: #0b0e11;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Fullscreen Map Layer */
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            z-index: 0;
        }

        /* UI Layer (Pass-through clicks to map) */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; 
            padding: 20px;
        }

        .ui-overlay > * {
            pointer-events: auto; /* Enable clicks for UI elements */
        }

        /* Glassmorphism Panels */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .kpi-card {
            padding: 15px;
            margin-bottom: 15px;
            text-align: right;
        }

        .kpi-value {
            color: var(--primary-blue);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0;
        }

        .chat-container {
            height: 500px;
            display: flex;
            flex-direction: column;
        }

        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 0.9rem;
            padding-right: 5px;
        }

        /* Scrollbar Styling */
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .input-group input {
            background: rgba(0,0,0,0.3) !important;
            border: 1px solid var(--glass-border) !important;
            color: white !important;
        }

        .btn-ai {
            background: var(--primary-blue);
            border: none;
            color: black;
            font-weight: 600;
        }

        .btn-ai:hover {
            background: #00a8cc;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-overlay">
        <div class="container-fluid h-100">
            <div class="row h-100">
                
                <div class="col-md-3">
                    <div class="glass-panel p-3 chat-container">
                        <div class="d-flex align-items-center mb-3">
                            <div style="width: 10px; height: 10px; background: #00ff00; border-radius: 50%; margin-right: 10px; box-shadow: 0 0 5px #00ff00;"></div>
                            <h5 class="m-0 text-uppercase tracking-widest" style="letter-spacing: 2px;">LORRI.AI</h5>
                        </div>
                        <hr class="bg-secondary">
                        
                        <div id="chat-box" class="mb-3">
                            <div class="mb-2">
                                <small class="text-info">LORRI:</small>
                                <div class="p-2 rounded bg-dark border border-secondary">Intelligence grid online. Systems monitoring Shanghai - Ningbo corridor. How can I assist with rerouting?</div>
                            </div>
                        </div>

                        <div class="input-group">
                            <input type="text" id="user-input" class="form-control" placeholder="Type a port (e.g. Singapore)..." onkeypress="if(event.key === 'Enter') sendMessage()">
                            <button class="btn btn-ai px-3" onclick="sendMessage()">→</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-2 ms-auto">
                    <div class="glass-panel kpi-card">
                        <small class="text-secondary text-uppercase" style="font-size: 0.7rem;">Est. ROI Increase</small>
                        <p class="kpi-value">+$142.5k</p>
                    </div>
                    <div class="glass-panel kpi-card">
                        <small class="text-secondary text-uppercase" style="font-size: 0.7rem;">CO2 Optimization</small>
                        <p class="kpi-value text-success">88.4%</p>
                    </div>
                    <div class="glass-panel kpi-card">
                        <small class="text-secondary text-uppercase" style="font-size: 0.7rem;">Active Fleet</small>
                        <p class="kpi-value">1,204</p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize Map with Dark Mode Tiles
        var map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([31.2304, 121.4737], 6);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // Initial Route (Shanghai to Ningbo)
        var route = L.polyline([[31.2304, 121.4737], [29.8683, 121.5440]], {
            color: '#00d4ff',
            weight: 3,
            opacity: 0.7,
            dashArray: '8, 8'
        }).addTo(map);

        // API Interaction Function
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = input.value;
            if (!message) return;

            // Update UI with User Message
            chatBox.innerHTML += `<div class="mb-2 text-end"><small class="text-secondary">YOU:</small><div class="p-2 rounded bg-primary text-black d-inline-block">${message}</div></div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // Fetch from Flask Backend
            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();

                // LORRI's Response
                chatBox.innerHTML += `<div class="mb-2"><small class="text-info">LORRI:</small><div class="p-2 rounded bg-dark border border-info">${data.message}</div></div>`;
                chatBox.scrollTop = chatBox.scrollHeight;

                // Move Map if Coordinates Exist
                if (data.coords) {
                    map.flyTo(data.coords, 8, { animate: true, duration: 2.5 });
                    L.circleMarker(data.coords, {
                        radius: 10,
                        fillColor: "#00d4ff",
                        color: "#fff",
                        fillOpacity: 0.5
                    }).addTo(map).bindPopup(`AI Focus: ${data.city}`).openPopup();
                }
            } catch (err) {
                console.error("Connection to Flask failed.", err);
            }
        }
    </script>
</body>
</html>
